# GH actions.
# We use it to cover windows and mac builds
# Jenkins is still the primary CI

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: CI-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  Platform:
    if: ${{ github.repository == 'apache/tvm' }}
    strategy:
      matrix:
        include:
          - name: MacOS
            os: macOS-latest
          - name: Windows
            os: windows-latest
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}
    env:
      UV_PYTHON: ${{ matrix.os == 'windows-latest' && '.venv/Scripts/python.exe' || '.venv/bin/python' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: 'recursive'
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          python-version: "3.10"
          enable-cache: true
          cache-python: true

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Create venv
        run: |
          uv venv .venv

      - name: Install python dependencies
        run: uv pip install --verbose scikit-build-core

      - name: Install LLVM dependencies (MacOS)
        if: matrix.os == 'macOS-latest'
        run: brew install llvm cmake ninja zlib

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install llvm cmake ninja -y --no-progress

      - name: Install LLVM + provide libxml2s.lib (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # ---- LLVM (official release tarball) ----
          $llvmVersion = "20.1.0"
          $llvmBase = Join-Path $env:RUNNER_TEMP "llvm"
          New-Item -ItemType Directory -Force -Path $llvmBase | Out-Null

          $llvmArchive = Join-Path $llvmBase "clang+llvm-$llvmVersion-x86_64-pc-windows-msvc.tar.xz"
          Invoke-WebRequest `
            -Uri "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/clang%2Bllvm-$llvmVersion-x86_64-pc-windows-msvc.tar.xz" `
            -OutFile $llvmArchive
          tar -xf $llvmArchive -C $llvmBase

          $llvmRoot   = Join-Path $llvmBase "clang+llvm-$llvmVersion-x86_64-pc-windows-msvc"
          $llvmConfig = Join-Path $llvmRoot "bin\llvm-config.exe"
          $llvmLibDir = & $llvmConfig --libdir

          # ---- vcpkg libxml2 -> copy as libxml2s.lib into LLVM libdir ----
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          git clone --depth 1 https://github.com/microsoft/vcpkg.git $vcpkgRoot
          & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          & "$vcpkgRoot\vcpkg.exe" install libxml2:x64-windows

          $vcpkgInstalled = Join-Path $vcpkgRoot "installed\x64-windows"

          Copy-Item `
            (Join-Path $vcpkgInstalled "lib\libxml2.lib") `
            (Join-Path $llvmLibDir "libxml2s.lib") `
            -Force

          # 実行時に dll を拾えるように PATH に追加
          Add-Content $env:GITHUB_PATH "$pwd\.venv\Scripts"
          Add-Content $env:GITHUB_PATH (Join-Path $vcpkgInstalled "bin")

          # 後続 step 用に llvm-config の場所を export（CMake は / 区切りが無難）
          $llvmConfigFwd = $llvmConfig.Replace('\','/')
          Add-Content $env:GITHUB_ENV "LLVM_CONFIG=$llvmConfigFwd"

      - name: Build and Install tvm-ffi
        run: uv pip install --verbose ./3rdparty/tvm-ffi

      - name: Build and Install TVM (MacOS)
        if: matrix.os == 'macOS-latest'
        run: |
          export CMAKE_ARGS="-G Ninja -DUSE_LLVM='/opt/homebrew/opt/llvm/bin/llvm-config' -DBUILD_TESTING=OFF"
          uv pip install --no-deps . --verbose

      - name: Build and Install TVM (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $env:CMAKE_ARGS = "-DUSE_LLVM=$env:LLVM_CONFIG -DBUILD_TESTING=OFF"
          uv pip install --no-deps . --verbose

      - name: Install test dependencies
        run: uv pip install --verbose psutil cloudpickle ml_dtypes numpy packaging scipy tornado typing_extensions pytest

      - name: Debug versions
        run: |
          uv run python -V
          uv run python -c "import pytest; print('pytest', pytest.__version__)"
          uv run python -c "import tvm; print('tvm imported')"

      - name: Platform minimal test
        run: uv run pytest -v tests/python/all-platform-minimal-test

      - name: Minimal Metal Compile-Only
        if: matrix.os == 'macOS-latest'
        run: |
          uv run pytest -v -s 'tests/python/codegen/test_gpu_codegen_allreduce.py::test_allreduce_sum_compile'
          uv run pytest -v -s 'tests/python/codegen/test_target_codegen_metal.py::test_func_with_trailing_pod_params'

      - name: Minimal Metal Compile-and-Run
        if: matrix.os == 'macOS-latest'
        run: |
          uv run pytest -v -s 'tests/python/codegen/test_target_codegen_metal.py'
          uv run pytest -v -s 'tests/python/codegen/test_target_codegen_gpu_common.py'
          uv run pytest -v -s 'tests/python/codegen/test_gpu_codegen_allreduce.py::test_allreduce_sum[dims0-metal]'
